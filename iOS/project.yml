name: Kitchenline
options:
  bundleIdPrefix: com.shimondeitel
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Kitchenline:
    type: application
    platform: iOS
    sources:
      - path: Kitchenline
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.kitchenline
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Kitchenline/Info.plist
        CODE_SIGN_ENTITLEMENTS: Kitchenline/Kitchenline.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  KitchenlineTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: KitchenlineTests
      - path: Kitchenline.storekit
    dependencies:
      - target: Kitchenline
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.kitchenline.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Kitchenline:
    build:
      targets:
        Kitchenline: all
        KitchenlineTests: [test]
    run:
      config: Debug
      storeKitConfiguration: Kitchenline.storekit
    test:
      config: Debug
      storeKitConfiguration: Kitchenline.storekit
      targets:
        - KitchenlineTests
    archive:
      config: Release
